{% macro tooltip(text, label='Aide') -%}
  <span class="ux-tooltip-trigger" tabindex="0" title="{{ text }}" aria-label="{{ label }} : {{ text }}">ⓘ</span>
{%- endmacro %}

{% macro helper(text) -%}
  <div class="ux-helper">{{ text }}</div>
{%- endmacro %}

{% macro callout(title, text, tone='info') -%}
  <div class="ux-callout ux-callout--{{ tone }}">
    <div class="ux-callout__title">{{ title }}</div>
    <div class="ux-callout__text">{{ text }}</div>
  </div>
{%- endmacro %}
