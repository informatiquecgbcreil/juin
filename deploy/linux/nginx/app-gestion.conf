# Redirection HTTP -> HTTPS (sauf healthz pour les sondes LAN simples)
server {
    listen 80;
    server_name app-gestion.example.org;

    location /healthz {
        proxy_pass http://127.0.0.1:8000/healthz;
        access_log off;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name app-gestion.example.org;

    # Certificats TLS (Let's Encrypt: certbot --nginx, ou certificat interne)
    ssl_certificate     /etc/ssl/app-gestion/fullchain.pem;
    ssl_certificate_key /etc/ssl/app-gestion/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # HSTS: à activer une fois le HTTPS validé sur tous les postes/bornes
    # add_header Strict-Transport-Security "max-age=31536000" always;

    # Uploads potentiellement volumineux (ajuster selon besoin)
    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location /healthz {
        proxy_pass http://127.0.0.1:8000/healthz;
        access_log off;
    }
}
